    url: /
    identifier: home
    weight: 3

  - name: Tarot & Oracle
    url: /tarot/
    identifier: tarot
    weight: 10

  - name: Dreams & Shadow
    url: /dreams/
    identifier: dreams
    weight: 20

  - name: Energy & Chakras
    url: /energy/
    identifier: energy
    weight: 30

  - name: Astrology & Symbols
    url: /astrology/
    weight: 40
    identifier: astrology

  - name: Reviews & Tools
