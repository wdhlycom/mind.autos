backend:
  name: github
  repo: 你的GitHub用户名/你的仓库名 # 替换为你的实际仓库
  branch: main                       # 你的默认分支
  local_backend: true  # <--- 必须有这一行，才会走本地的 8081 端口

media_folder: "static/uploads"       # 图片等媒体文件存放路径
public_folder: "/uploads"            # 网站访问路径

collections:
  - name: "posts"
    label: "评测文章"
    folder: "content/posts"          # 对应 Hugo 的文章存放目录
    create: true                     # 允许在后台新建文章
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "分类", name: "categories", widget: "list"}
      - {label: "标签", name: "tags", widget: "list"}
      - {label: "正文", name: "body", widget: "markdown"}