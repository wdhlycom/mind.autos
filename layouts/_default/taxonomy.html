{{ define "main" }}

<div class="max-w-prose mx-auto flex justify-start">
  <article class="prose prose-slate lg:prose-xl dark:prose-invert max-w-none">
    <h1 class="lg:text-6xl !mb-4">{{ .Title }}</h1>
    {{ .Content }}
  </article>
</div>

<div class="max-w-prose mx-auto my-5">
  <div class="flex flex-row gap-6 flex-wrap">
    {{- $type := .Type }}
    {{- range $key, $value := .Data.Terms.Alphabetical }}
      {{- $name := .Name }}
      {{- $count := .Count }}
      {{- with site.GetPage (printf "/%s/%s" $type $name) }}
        <a href="{{ .RelPermalink }}" class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-center text-white bg-gradient-to-r from-purple-600 to-indigo-600 rounded-lg hover:from-purple-700 hover:to-indigo-700 focus:ring-4 focus:outline-none focus:ring-purple-300 dark:focus:ring-purple-800 transition-all duration-300">
          {{ .Title }}
          <span class="inline-flex items-center justify-center w-4 h-4 ms-2 text-xs font-semibold text-purple-800 bg-purple-200 rounded-full dark:bg-purple-700 dark:text-purple-200">
            {{ $count }}
          </span>
        </a>
      {{- end }}
    {{- end }}
  </div>
</div>

{{ end }}
