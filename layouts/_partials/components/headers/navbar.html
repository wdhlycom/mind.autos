<!-- Unified navbar override — logo left, menu right, slim -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-gray-900/90 backdrop-blur-md">
  <div class="max-w-7xl mx-auto px-6 py-1.5">
    <div class="flex justify-between items-center">
      <a href="{{ site.Home.RelPermalink }}" class="flex-shrink-0 rounded-full overflow-hidden border border-[#d4af37]/30 w-10 h-10">
        <img src="/img/logo.png" alt="{{ site.Title }}" class="w-full h-full object-cover">
      </a>
      <div class="hidden md:flex items-center space-x-6 flex-nowrap">
        {{ range site.Menus.main }}
        <a href="{{ .URL }}" class="text-white/85 hover:text-[#d4af37] font-bold text-sm whitespace-nowrap transition-colors duration-300">{{ .Name }}</a>
        {{ end }}
      </div>
      <button id="mobile-menu-btn" class="md:hidden text-white" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>
</nav>
<div id="mobile-menu-panel" class="fixed top-12 left-0 right-0 z-40 bg-gray-900/95 backdrop-blur-md hidden">
  <div class="px-6 py-4 flex flex-col space-y-4">
    {{ range site.Menus.main }}
    <a href="{{ .URL }}" class="text-white font-bold py-2 border-b border-gray-700/50">{{ .Name }}</a>
    {{ end }}
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('mobile-menu-btn');
    var panel = document.getElementById('mobile-menu-panel');
    if(btn && panel){
      btn.addEventListener('click', function(){ panel.classList.toggle('hidden'); });
      document.addEventListener('click', function(e){
        if(!btn.contains(e.target) && !panel.contains(e.target)) panel.classList.add('hidden');
      });
    }
  });
</script>
