{{ define "main" }}
<style>
  @keyframes driftSlow { 0% { transform: translate(0, 0); } 50% { transform: translate(6vw, -3vh); } 100% { transform: translate(0, 0); } }
  @keyframes driftWide { 0% { transform: translate(0, 0); } 33% { transform: translate(-5vw, -5vh); } 66% { transform: translate(8vw, 2vh); } 100% { transform: translate(0, 0); } }
  @keyframes driftGentle { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-3vw, -4vh) scale(1.1); } 100% { transform: translate(0, 0) scale(1); } }
  .cloud-blob { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(50px); will-change: transform; mix-blend-mode: screen; }
  .cloud-blob.lavender { width: 50vw; height: 40vh; background: radial-gradient(ellipse at center, rgba(160,140,210,0.45) 0%, rgba(140,120,190,0.25) 30%, rgba(100,80,160,0.08) 65%, transparent 100%); }
  .cloud-blob.rose { width: 40vw; height: 35vh; background: radial-gradient(ellipse at center, rgba(210,160,180,0.35) 0%, rgba(190,140,160,0.18) 35%, rgba(150,100,130,0.05) 70%, transparent 100%); }
  .cloud-blob.gold { width: 35vw; height: 30vh; background: radial-gradient(ellipse at center, rgba(230,200,140,0.30) 0%, rgba(200,170,110,0.15) 40%, transparent 100%); }
  .cloud-blob.pearl { width: 45vw; height: 38vh; background: radial-gradient(ellipse at center, rgba(220,215,230,0.35) 0%, rgba(200,190,210,0.18) 40%, rgba(160,150,180,0.05) 70%, transparent 100%); }
  .c1 { top: -5%; left: -10%; animation: driftSlow 22s ease-in-out infinite; }
  .c2 { top: 10%; right: -15%; animation: driftWide 26s ease-in-out infinite; animation-delay: -4s; }
  .c3 { top: 35%; left: 5%; animation: driftGentle 20s ease-in-out infinite; animation-delay: -9s; }
  .c4 { top: 50%; right: -5%; animation: driftSlow 28s ease-in-out infinite; animation-delay: -14s; }
  .c5 { top: 65%; left: -8%; animation: driftWide 24s ease-in-out infinite; animation-delay: -7s; }
  .c6 { top: 75%; right: 10%; animation: driftGentle 30s ease-in-out infinite; animation-delay: -18s; }
  @keyframes sparkleFloat { 0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; } 20% { transform: translateY(-30px) translateX(15px) scale(1); opacity: 0.8; } 50% { transform: translateY(-60px) translateX(-10px) scale(0.5); opacity: 0.4; } 80% { transform: translateY(-90px) translateX(5px) scale(0.2); opacity: 0.1; } 100% { transform: translateY(-120px) translateX(0) scale(0); opacity: 0; } }
  @keyframes sparkleFloat2 { 0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; } 25% { transform: translateY(-25px) translateX(-20px) scale(1); opacity: 0.7; } 55% { transform: translateY(-55px) translateX(10px) scale(0.6); opacity: 0.35; } 100% { transform: translateY(-100px) translateX(0) scale(0); opacity: 0; } }
  @keyframes sparkleFloat3 { 0% { transform: translateY(0) scale(0); opacity: 0; } 30% { transform: translateY(-35px) scale(1); opacity: 0.75; } 70% { transform: translateY(-70px) scale(0.4); opacity: 0.2; } 100% { transform: translateY(-110px) scale(0); opacity: 0; } }
  .sparkle { position: absolute; pointer-events: none; border-radius: 50%; animation-fill-mode: both; box-shadow: 0 0 6px 2px rgba(230,210,180,0.6), 0 0 12px 4px rgba(200,170,140,0.3); }
  .s-gold { background: #f0d78c; }
  .s-rose { background: #e8b4c0; box-shadow: 0 0 6px 2px rgba(230,170,180,0.6), 0 0 12px 4px rgba(200,140,155,0.3); }
  .s-lav { background: #c8b8e8; box-shadow: 0 0 6px 2px rgba(190,170,220,0.6), 0 0 12px 4px rgba(160,140,190,0.3); }
  .s-pearl { background: #e8e4f0; box-shadow: 0 0 6px 2px rgba(220,215,230,0.6), 0 0 12px 4px rgba(200,190,210,0.3); }
  .sp-1 { width: 5px; height: 5px; } .sp-2 { width: 3px; height: 3px; } .sp-3 { width: 4px; height: 4px; }
  @keyframes orbRise { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; } 50% { transform: translateY(-15px) scale(1.2); opacity: 0.7; } }
  .glow-orb { position: absolute; border-radius: 50%; pointer-events: none; will-change: transform, opacity; filter: blur(40px); }
  .orb-a { top: 20%; left: 25%; width: 20vw; height: 20vw; background: radial-gradient(circle, rgba(180,150,210,0.4), transparent 70%); animation: orbRise 10s ease-in-out infinite; }
  .orb-b { top: 55%; right: 20%; width: 18vw; height: 18vw; background: radial-gradient(circle, rgba(210,160,180,0.35), transparent 70%); animation: orbRise 13s ease-in-out infinite; animation-delay: -5s; }
  .orb-c { top: 35%; left: 60%; width: 15vw; height: 15vw; background: radial-gradient(circle, rgba(230,200,150,0.3), transparent 70%); animation: orbRise 11s ease-in-out infinite; animation-delay: -3s; }
</style>

<div class="min-h-screen relative overflow-hidden bg-gradient-to-b from-[#241840] via-[#2e2250] via-[#261c45] to-[#1c1435]">
  <div class="cloud-blob lavender c1" style="opacity:0.6"></div>
  <div class="cloud-blob rose c2" style="opacity:0.5"></div>
  <div class="cloud-blob pearl c3" style="opacity:0.45"></div>
  <div class="cloud-blob gold c4" style="opacity:0.4"></div>
  <div class="cloud-blob lavender c5" style="opacity:0.35"></div>
  <div class="cloud-blob rose c6" style="opacity:0.3"></div>
  <div class="glow-orb orb-a" style="opacity:0.6"></div>
  <div class="glow-orb orb-b" style="opacity:0.5"></div>
  <div class="glow-orb orb-c" style="opacity:0.45"></div>
  {{ range $i := seq 12 }}
  <div class="sparkle s-gold sp-1" style="left:{{ math.Mod (mul $i 37) 100 }}%;top:{{ math.Mod (mul $i 53) 90 }}%;animation:sparkleFloat {{ add (math.Mod (mul $i 3) 5) 6 }}s ease-out {{ math.Mod (mul $i 2.1) 8 }}s infinite;"></div>
  {{ end }}
  {{ range $i := seq 12 }}
  <div class="sparkle s-rose sp-2" style="left:{{ math.Mod (mul $i 43) 100 }}%;top:{{ math.Mod (mul $i 59) 90 }}%;animation:sparkleFloat2 {{ add (math.Mod (mul $i 4) 4) 7 }}s ease-out {{ math.Mod (mul $i 1.7) 10 }}s infinite;"></div>
  {{ end }}
  {{ range $i := seq 12 }}
  <div class="sparkle s-lav sp-3" style="left:{{ math.Mod (mul $i 47) 100 }}%;top:{{ math.Mod (mul $i 29) 90 }}%;animation:sparkleFloat3 {{ add (math.Mod (mul $i 3) 4) 8 }}s ease-out {{ math.Mod (mul $i 3.5) 9 }}s infinite;"></div>
  {{ end }}
  {{ range $i := seq 8 }}
  <div class="sparkle s-pearl sp-2" style="left:{{ math.Mod (mul $i 51) 100 }}%;top:{{ math.Mod (mul $i 41) 90 }}%;animation:sparkleFloat {{ add (math.Mod (mul $i 5) 4) 7 }}s ease-out {{ math.Mod (mul $i 4.2) 8 }}s infinite;"></div>
  {{ end }}

  {{ partial "article_body.html" . }}
</div>
{{ end }}
